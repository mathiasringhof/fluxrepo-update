apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: flux-system
spec:
  releaseName: paperless-ngx
  targetNamespace: paperless-ngx
  chart:
    spec:
      chart: paperless-ngx
      version: "12.0.0"
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 1h
  interval: 10m
  values:
    persistence:
      data:
        enabled: true
        size: 5Gi
